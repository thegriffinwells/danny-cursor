<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DANNY NY</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=Bebas+Neue&family=Oswald:wght@400;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Anton&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400;1,700&family=Archivo+Black&family=DM+Serif+Display:ital@0;1&family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;700&family=Syne:wght@400;700;800&family=Darker+Grotesque:wght@400;700;900&family=Bodoni+Moda:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #fff;
    cursor: crosshair;
    touch-action: none;
    -webkit-overflow-scrolling: none;
    overscroll-behavior: none;
  }

  /* Pages */
  .page {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: calc(100% - 32px);
    overflow: hidden;
  }

  .page.hidden {
    display: none;
  }

  /* Tab Bar */
  .tab-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 32px;
    display: flex;
    z-index: 9999;
    background: transparent;
  }

  .tab-bar button {
    flex: 1;
    padding: 0;
    background: none;
    border: none;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    color: #ccc;
    transition: color 0.15s ease;
  }

  .tab-bar button.active {
    color: #999;
  }

  .tab-bar button:not(.active):hover {
    color: #999;
  }

  /* Page 1: Trail */
  .wordmark {
    position: absolute;
    white-space: nowrap;
    pointer-events: none;
    user-select: none;
    color: #000;
    opacity: 0;
    animation: fadeIn 0.1s ease-out forwards;
    transition: opacity 0.3s ease;
  }

  .wordmark.fading {
    opacity: 0 !important;
    transition: opacity 1.5s ease;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* Page 2: Famous Dannys */
  #page-dannys {
    background: #fafafa;
  }

  .danny-card {
    position: absolute;
    pointer-events: none;
    user-select: none;
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease;
    text-align: center;
  }

  .danny-card.visible {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  .danny-card.fading {
    opacity: 0 !important;
    transform: translate(-50%, -50%) scale(0.6);
    transition: transform 0.4s ease, opacity 0.4s ease;
  }

  .danny-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 0;
    display: block;
    box-shadow: 0 4px 24px rgba(0,0,0,0.25);
  }

  .danny-hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Courier New', monospace;
    font-size: 14px;
    color: #ccc;
    letter-spacing: 0.08em;
    text-align: center;
    pointer-events: none;
    transition: opacity 0.5s ease;
    line-height: 2;
  }
</style>
</head>
<body>

<div id="page-trail" class="page"></div>
<div id="page-dannys" class="page hidden">
  <div class="danny-hint" id="danny-hint">MOVE YOUR CURSOR TO SUMMON THE DANNYS<br><span style="font-size:12px;color:#ddd">CLICK TO UNLEASH THEM</span></div>
</div>

<div class="tab-bar" id="tab-bar">
  <button class="active" data-page="trail">TRAIL</button>
  <button data-page="dannys">FAMOUS DANNYS</button>
</div>

<script>
// ============================================
// Navigation
// ============================================
let activePage = 'trail';

document.querySelectorAll('.tab-bar button').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const page = btn.dataset.page;
    if (page === activePage) return;
    activePage = page;

    document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    document.getElementById('page-trail').classList.toggle('hidden', page !== 'trail');
    document.getElementById('page-dannys').classList.toggle('hidden', page !== 'dannys');
  });
});

// Prevent tab bar from triggering page events
const tabBar = document.getElementById('tab-bar');
tabBar.addEventListener('mousedown', e => e.stopPropagation());
tabBar.addEventListener('touchstart', e => e.stopPropagation(), { passive: false });
tabBar.addEventListener('touchmove', e => e.stopPropagation(), { passive: false });
tabBar.addEventListener('touchend', e => e.stopPropagation(), { passive: false });

// ============================================
// Page 1: TRAIL (existing functionality)
// ============================================
const trailPage = document.getElementById('page-trail');

const fonts = [
  { family: 'Playfair Display', weight: '900', style: 'normal' },
  { family: 'Playfair Display', weight: '400', style: 'italic' },
  { family: 'Bebas Neue', weight: '400', style: 'normal' },
  { family: 'Oswald', weight: '700', style: 'normal' },
  { family: 'Libre Baskerville', weight: '700', style: 'normal' },
  { family: 'Libre Baskerville', weight: '400', style: 'italic' },
  { family: 'Anton', weight: '400', style: 'normal' },
  { family: 'Cormorant Garamond', weight: '700', style: 'normal' },
  { family: 'Cormorant Garamond', weight: '400', style: 'italic' },
  { family: 'Archivo Black', weight: '400', style: 'normal' },
  { family: 'DM Serif Display', weight: '400', style: 'normal' },
  { family: 'DM Serif Display', weight: '400', style: 'italic' },
  { family: 'Instrument Serif', weight: '400', style: 'normal' },
  { family: 'Instrument Serif', weight: '400', style: 'italic' },
  { family: 'Space Grotesk', weight: '700', style: 'normal' },
  { family: 'Syne', weight: '800', style: 'normal' },
  { family: 'Darker Grotesque', weight: '900', style: 'normal' },
  { family: 'Bodoni Moda', weight: '900', style: 'normal' },
  { family: 'Bodoni Moda', weight: '400', style: 'italic' },
  { family: 'Georgia, serif', weight: '400', style: 'normal' },
  { family: 'Impact, sans-serif', weight: '400', style: 'normal' },
  { family: 'Times New Roman, serif', weight: '700', style: 'normal' },
];

const sizes = [14, 18, 22, 28, 36, 44, 54];
const maxWordmarks = 120;
const wordmarks = [];
let lastX = -1;
let lastY = -1;
let fontIndex = 0;

function createWordmark(x, y, spread, sizeOverride) {
  const el = document.createElement('div');
  el.className = 'wordmark';
  el.textContent = 'DANNY NY';

  const font = fonts[fontIndex % fonts.length];
  fontIndex++;

  const size = sizeOverride || sizes[Math.floor(Math.random() * sizes.length)];
  const offsetX = (Math.random() - 0.5) * (spread || 40);
  const offsetY = (Math.random() - 0.5) * (spread || 40);
  const rotation = (Math.random() - 0.5) * 30;

  el.style.fontFamily = font.family;
  el.style.fontWeight = font.weight;
  el.style.fontStyle = font.style;
  el.style.fontSize = size + 'px';
  el.style.letterSpacing = (Math.random() * 0.15).toFixed(2) + 'em';
  el.style.left = (x + offsetX) + 'px';
  el.style.top = (y + offsetY) + 'px';
  el.style.transform = `translate(-50%, -50%) rotate(${rotation}deg)`;

  trailPage.appendChild(el);
  wordmarks.push(el);

  if (wordmarks.length > maxWordmarks) {
    const old = wordmarks.shift();
    old.classList.add('fading');
    setTimeout(() => old.remove(), 1500);
  }
}

function explode(x, y) {
  const count = 14 + Math.floor(Math.random() * 8);
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'wordmark';
    el.textContent = 'DANNY NY';

    const font = fonts[fontIndex % fonts.length];
    fontIndex++;

    const size = sizes[Math.floor(Math.random() * sizes.length)];
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
    const distance = 150 + Math.random() * 250;
    const endX = Math.cos(angle) * distance;
    const endY = Math.sin(angle) * distance;
    const rotation = (Math.random() - 0.5) * 60;

    el.style.fontFamily = font.family;
    el.style.fontWeight = font.weight;
    el.style.fontStyle = font.style;
    el.style.fontSize = size + 'px';
    el.style.letterSpacing = (Math.random() * 0.15).toFixed(2) + 'em';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.transform = `translate(-50%, -50%) rotate(0deg)`;
    el.style.transition = 'none';
    el.style.opacity = '1';
    el.style.animation = 'none';

    trailPage.appendChild(el);
    wordmarks.push(el);

    requestAnimationFrame(() => {
      el.style.transition = 'transform 0.6s cubic-bezier(0.2, 0.8, 0.3, 1), opacity 0.6s ease';
      el.style.transform = `translate(calc(-50% + ${endX}px), calc(-50% + ${endY}px)) rotate(${rotation}deg)`;
      el.style.opacity = '0.85';
    });

    if (wordmarks.length > maxWordmarks) {
      const old = wordmarks.shift();
      old.classList.add('fading');
      setTimeout(() => old.remove(), 1500);
    }
  }
}

// Trail mouse events
let trailThrottle = false;

document.addEventListener('mousemove', (e) => {
  if (activePage !== 'trail' || trailThrottle) return;
  trailThrottle = true;

  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (lastX === -1 || dist > 20) {
    createWordmark(e.clientX, e.clientY);
    lastX = e.clientX;
    lastY = e.clientY;
  }

  requestAnimationFrame(() => { trailThrottle = false; });
});

document.addEventListener('click', (e) => {
  if (activePage !== 'trail') return;
  if (e.target.closest('.tab-bar')) return;
  explode(e.clientX, e.clientY);
});

// Trail touch events
let touchMoved = false;

document.addEventListener('touchstart', (e) => {
  if (activePage !== 'trail') return;
  if (e.target.closest('.tab-bar')) return;
  e.preventDefault();
  touchMoved = false;
  const t = e.touches[0];
  lastX = t.clientX;
  lastY = t.clientY;
  createWordmark(t.clientX, t.clientY);
}, { passive: false });

document.addEventListener('touchmove', (e) => {
  if (activePage !== 'trail') return;
  if (e.target.closest('.tab-bar')) return;
  e.preventDefault();
  touchMoved = true;
  for (let i = 0; i < e.touches.length; i++) {
    const t = e.touches[i];
    const dx = t.clientX - lastX;
    const dy = t.clientY - lastY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 15) {
      createWordmark(t.clientX, t.clientY);
      lastX = t.clientX;
      lastY = t.clientY;
    }
  }
}, { passive: false });

document.addEventListener('touchend', (e) => {
  if (activePage !== 'trail') return;
  if (e.target.closest('.tab-bar')) return;
  e.preventDefault();
  if (!touchMoved) {
    const t = e.changedTouches[0];
    explode(t.clientX, t.clientY);
  }
  lastX = -1;
  lastY = -1;
}, { passive: false });

// ============================================
// Page 2: FAMOUS DANNYS
// ============================================
const dannysPage = document.getElementById('page-dannys');
const dannyHint = document.getElementById('danny-hint');

const famousDannys = [
  { name: 'DANNY DEVITO', wiki: 'Danny_DeVito' },
  { name: 'DANNY GLOVER', wiki: 'Danny_Glover' },
  { name: 'DANNY TREJO', wiki: 'Danny_Trejo' },
  { name: 'DANNY MCBRIDE', wiki: 'Danny_McBride' },
  { name: 'DANNY ELFMAN', wiki: 'Danny_Elfman' },
  { name: 'DANNY KAYE', wiki: 'Danny_Kaye' },
  { name: 'DANNY AIELLO', wiki: 'Danny_Aiello' },
  { name: 'DANNY BROWN', wiki: 'Danny_Brown_(rapper)' },
  { name: 'DANNY GREEN', wiki: 'Danny_Green_(basketball)' },
  { name: 'DANNY BOYLE', wiki: 'Danny_Boyle' },
  { name: 'DANNY WELBECK', wiki: 'Danny_Welbeck' },
  { name: 'DANNY CAREY', wiki: 'Danny_Carey' },
  { name: 'DANNY MASSEY', wiki: 'Daniel_Massey' },
  { name: 'DANNY THOMAS', wiki: 'Danny_Thomas' },
];

let dannyImages = []; // { name, src } after loading
const dannyCards = [];
const maxDannyCards = 40;
let dannyLastX = -1;
let dannyLastY = -1;
let hintHidden = false;

// Fetch images from Wikipedia REST API
async function loadDannyImages() {
  const results = await Promise.allSettled(
    famousDannys.map(async (danny) => {
      const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${danny.wiki}`);
      const data = await res.json();
      if (data.thumbnail && data.thumbnail.source) {
        const src = data.thumbnail.source.replace(/\/\d+px-/, '/300px-');
        // Preload image
        await new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = resolve;
          img.onerror = reject;
          img.src = src;
        });
        return { name: danny.name, src };
      }
      throw new Error('No thumbnail');
    })
  );

  dannyImages = results
    .filter(r => r.status === 'fulfilled')
    .map(r => r.value);
}

loadDannyImages();

function getRandomDanny() {
  if (dannyImages.length === 0) return null;
  return dannyImages[Math.floor(Math.random() * dannyImages.length)];
}

function spawnDanny(x, y, sizeMultiplier) {
  const danny = getRandomDanny();
  if (!danny) return;

  if (!hintHidden) {
    hintHidden = true;
    dannyHint.style.opacity = '0';
  }

  const card = document.createElement('div');
  card.className = 'danny-card';

  const dim = (90 + Math.random() * 30) * (sizeMultiplier || 1);
  const offsetX = (Math.random() - 0.5) * 100;
  const offsetY = (Math.random() - 0.5) * 100;

  card.style.left = (x + offsetX) + 'px';
  card.style.top = (y + offsetY) + 'px';
  card.style.width = dim + 'px';

  const img = document.createElement('img');
  img.src = danny.src;
  img.alt = danny.name;
  img.style.width = dim + 'px';
  img.style.height = dim + 'px';
  card.appendChild(img);

  dannysPage.appendChild(card);
  dannyCards.push(card);

  // Animate in
  requestAnimationFrame(() => {
    card.classList.add('visible');
  });

  // Fade out after a bit
  const lifetime = 1800 + Math.random() * 1200;
  setTimeout(() => {
    card.classList.remove('visible');
    card.classList.add('fading');
    setTimeout(() => card.remove(), 500);
  }, lifetime);

  // Remove oldest if too many
  if (dannyCards.length > maxDannyCards) {
    const old = dannyCards.shift();
    old.classList.remove('visible');
    old.classList.add('fading');
    setTimeout(() => old.remove(), 500);
  }
}

function dannyExplode(x, y) {
  const count = 8 + Math.floor(Math.random() * 6);
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.4;
    const distance = 80 + Math.random() * 160;
    const ex = x + Math.cos(angle) * distance;
    const ey = y + Math.sin(angle) * distance;

    setTimeout(() => {
      spawnDanny(ex, ey, 0.8 + Math.random() * 0.6);
    }, i * 40);
  }
}

// Danny mouse events
let dannyThrottle = false;

document.addEventListener('mousemove', (e) => {
  if (activePage !== 'dannys' || dannyThrottle) return;
  dannyThrottle = true;

  const dx = e.clientX - dannyLastX;
  const dy = e.clientY - dannyLastY;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dannyLastX === -1 || dist > 60) {
    spawnDanny(e.clientX, e.clientY);
    dannyLastX = e.clientX;
    dannyLastY = e.clientY;
  }

  requestAnimationFrame(() => { dannyThrottle = false; });
});

document.addEventListener('click', (e) => {
  if (activePage !== 'dannys') return;
  if (e.target.closest('.tab-bar')) return;
  dannyExplode(e.clientX, e.clientY);
});

// Danny touch events
let dannyTouchMoved = false;
let holdInterval = null;

document.addEventListener('touchstart', (e) => {
  if (activePage !== 'dannys') return;
  if (e.target.closest('.tab-bar')) return;
  e.preventDefault();
  dannyTouchMoved = false;
  const t = e.touches[0];
  dannyLastX = t.clientX;
  dannyLastY = t.clientY;
  spawnDanny(t.clientX, t.clientY);

  // Hold to rapid-fire
  holdInterval = setInterval(() => {
    if (e.touches.length > 0) {
      const touch = e.touches[0];
      spawnDanny(dannyLastX + (Math.random() - 0.5) * 60, dannyLastY + (Math.random() - 0.5) * 60);
    }
  }, 180);
}, { passive: false });

document.addEventListener('touchmove', (e) => {
  if (activePage !== 'dannys') return;
  if (e.target.closest('.tab-bar')) return;
  e.preventDefault();
  dannyTouchMoved = true;
  const t = e.touches[0];
  const dx = t.clientX - dannyLastX;
  const dy = t.clientY - dannyLastY;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > 40) {
    spawnDanny(t.clientX, t.clientY);
    dannyLastX = t.clientX;
    dannyLastY = t.clientY;
  }
}, { passive: false });

document.addEventListener('touchend', (e) => {
  if (activePage !== 'dannys') return;
  if (e.target.closest('.tab-bar')) return;
  e.preventDefault();
  clearInterval(holdInterval);
  holdInterval = null;
  if (!dannyTouchMoved) {
    const t = e.changedTouches[0];
    dannyExplode(t.clientX, t.clientY);
  }
  dannyLastX = -1;
  dannyLastY = -1;
}, { passive: false });
</script>
</body>
</html>
